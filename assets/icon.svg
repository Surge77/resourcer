<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b2735"/>
      <stop offset="1" stop-color="#0c121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="40" y1="200" x2="216" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.55" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- rounded app tile -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#tile)"/>
  <rect x="8.5" y="8.5" width="239" height="239" rx="55.5" fill="none" stroke="#3a4a5e" stroke-opacity="0.5"/>

  <!-- resource bars rising -->
  <g opacity="0.30">
    <rect x="56"  y="150" width="22" height="54"  rx="7" fill="url(#accent)"/>
    <rect x="94"  y="126" width="22" height="78"  rx="7" fill="url(#accent)"/>
    <rect x="132" y="98"  width="22" height="106" rx="7" fill="url(#accent)"/>
    <rect x="170" y="70"  width="22" height="134" rx="7" fill="url(#accent)"/>
  </g>

  <!-- soft halo under the pulse (fakes a glow without SVG filters) -->
  <path d="M44 150 L82 150 L100 150 L116 110 L134 178 L152 96 L168 150 L212 150"
        fill="none" stroke="url(#accent)" stroke-width="26" stroke-opacity="0.18"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- live pulse / heartbeat sparkline -->
  <path d="M44 150 L82 150 L100 150 L116 110 L134 178 L152 96 L168 150 L212 150"
        fill="none" stroke="url(#accent)" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- leading node -->
  <circle cx="212" cy="150" r="15" fill="#34d399" fill-opacity="0.2"/>
  <circle cx="212" cy="150" r="11" fill="#34d399"/>
</svg>
